<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>

        <fieldset>
            <legend>Seus Dados Pessoais</legend>


        <label for="iptNomeID" id="lblNome">Nome: </label>
        <input type="text" id="iptNomeID" name="iptNomeName" placeholder="Nome Completo">
        <br>
        <span>Data de nascimento</span>
        <input type="date">
        <span>Cor favorita</span>
        <input type="color">
        <br>
        <label for="iptEndID" id="lblEnd">Endereço: </label>
        <input type="text" id="iptEndID" name="iptEndereco">
        <br>
        <span>Bairro:</span>
        <input type="text">
        <label for="iptcidade" id="Cdd1">Cidade:  </label>
        <input type="text" id="iptcidade" name="iptcidade">
        <br>
        <label for="iptcep" id="Cep1">CEP:  </label>
        <input type="text" id="iptcep" name="iptcep">

        <span>Estado</span>
        <select id="Estado1" name="Estado">
        <option value="ceara">Ceará</option>
        <option value="amazonas">Amazonas</option>
        <option value="maranhao">Maranhão</option>
        <option value="sao paulo">São paulo</option>
    </select>
        </fieldset>

        <fieldset>
            <legend>Seus Dados Profissionais</legend>
        <span>Natureza do Cargo</span>
        <input type="radio" id="ipt1" name="cargo" value="1">
        <label for="ipt1">Gerência </label>
        <input type="radio" id="ipt2" name="cargo" value="2">
        <label for="ipt2">Financeiro</label>
        <input type="radio" id="iptr3" name="cargo" value="3">
        <label for="iptr3">Recepção</label>
        <input type="radio" id="iptr4" name="cargo" value="4">
        <label for="iptr4">Administrativo</label>
        <input type="radio" id="iptr5" name="cargo" value="5">
        <label for="iptr5">Juridico</label>
        <br>
        <br>
        <span>Área de interesse</span><br>
        <input type="checkbox" id="comp1" name="Comp" value="comp">
        <label for="comp1"> Computação</label>
        <input type="checkbox" id="qui1" name="Qui" value="qui">
        <label for="qui1"> Química</label>
        <input type="checkbox" id="amb1" name="Amb" value="amb">
        <label for="amb1"> Meio Ambiente</label>
        <input type="checkbox" id="eng1" name="eng" value="Eng">
        <label for="eng1"> Engenharia</label>
        <input type="checkbox" id="mat1" name="Mat" value="mat">
        <label for="mat1">Matematica</label>
        <br>
        <br>
        <span>Mini-currículo</span><br>
        <textarea></textarea>
        </fieldset>
        <br>
        <input type="reset" value="limpar">
        <input type="button" value="Enviar">

    </form>
</body>
</html>
